# =============================================================================
# Fluent Bit configuration.
#
# Goal:
# Spring Boot services write JSON logs to stdout.
# Docker stores container stdout/stderr logs on disk.
# Fluent Bit tails those Docker log files.
#
# Test mode:
# Spring Boot JSON log
# -> container stdout
# -> Docker JSON wrapper
# -> Fluent Bit
# -> parse inner Spring Boot JSON
# -> output
#
# Production/demo mode later:
# Fluent Bit -> Graylog GELF input
# =============================================================================

[SERVICE]
    # Flush buffered records every second.
    Flush        1
    # Internal Fluent Bit logging level.
    Log_Level    info

    # Standard parsers provided by the Fluent Bit image.
    # Includes the "docker" parser used by INPUT.
    Parsers_File /fluent-bit/etc/parsers.conf

    # Custom parser for Spring Boot JSON structured logs.
    Parsers_File /fluent-bit/etc/custom-parsers.conf


[INPUT]
    # Continuously read Docker container log files.
    Name              tail
    # Docker json-file logging driver stores logs here.
    Path              /var/lib/docker/containers/*/*.log

    # Parses Docker's outer fields: log, stream and time.
    Parser            docker

    # Tag used by FILTER and OUTPUT matching.
    Tag               docker.*


[FILTER]
    # Parse the JSON string currently stored inside the "log" field.
    Name              parser

    # Apply this filter to Docker records.
    Match             docker.*

    # Field containing the Spring Boot JSON line.
    Key_Name          log

    # Custom parser defined below in custom-parsers.conf.
    Parser            spring_boot_json

    # Keep Docker metadata such as stream and time.
    Reserve_Data      On

    # Remove the original escaped "log" string after successful parsing.
    Preserve_Key      Off


[OUTPUT]
    # Тестовый output: записываем собранные события в файл,
    # а не в stdout Fluent Bit, чтобы не создать рекурсивный цикл.
    Name    file

    # Обрабатываем записи из INPUT с тегом docker.*.
    Match   docker.*

    # Каталог внутри контейнера Fluent Bit.
    Path    /fluent-bit/collected

    # Имя выходного файла.
    File    containers.log

    # plain выводит сам record как JSON без добавления tag и timestamp wrapper.
    Format  plain
# # =============================================================================
# # Fluent Bit configuration.
# #
# # Goal:
# # Spring Boot services write JSON logs to stdout.
# # Docker stores container stdout/stderr logs on disk.
# # Fluent Bit tails those Docker log files and forwards logs to Graylog.
# #
# # Pipeline:
# # Spring Boot -> stdout -> Docker JSON logs -> Fluent Bit -> Graylog GELF input
# # =============================================================================

# [SERVICE]

#     # Send buffered logs every second.
#     # Smaller value = lower latency, but more network overhead.
#     Flush        1

#     # Fluent Bit internal logging level.
#     # This does not change application log level.
#     Log_Level    info


# # -----------------------------------------------------------------------------
# # INPUT
# # -----------------------------------------------------------------------------
# # Read Docker container stdout/stderr logs.
# #
# # Docker stores every container log as a JSON file under:
# # /var/lib/docker/containers/<container-id>/<container-id>-json.log
# #
# # Fluent Bit tails these files similarly to "tail -f".
# # -----------------------------------------------------------------------------

# [INPUT]

#     # Tail works like "tail -f": continuously reads appended log lines.
#     Name              tail

#     # Docker stores container logs here on the Docker host. Read logs from all Docker containers.
#     Path              /var/lib/docker/containers/*/*.log

#     # Docker log files are JSON wrappers around the real log message.
#     # Parser docker extracts the real log line from the Docker wrapper.
#     Parser            docker

#     # Tag is used later by OUTPUT Match.
#     Tag               docker.*


# # -----------------------------------------------------------------------------
# # OUTPUT
# # -----------------------------------------------------------------------------
# # Send logs to Graylog using GELF over UDP.
# #
# # Graylog must have GELF UDP Input configured on port 12201.
# # -----------------------------------------------------------------------------

# [OUTPUT]

#     # GELF = Graylog Extended Log Format.
#     Name              gelf

#     # Send all records tagged docker.*.
#     Match             docker.*

#     # graylog is the Docker Compose service name.
#     Host              graylog

#     # Must match the GELF UDP input port in Graylog UI.
#     Port              12201

#     # UDP is lightweight and non-blocking, acceptable for local/demo.
#     # Production may use TCP/HTTP or buffering depending on reliability needs.
#     Mode              udp