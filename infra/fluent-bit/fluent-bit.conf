# =============================================================================
# Fluent Bit configuration.
#
# Production idea:
# Spring Boot -> JSON logs -> stdout
#                ↓
#           Docker container logs
#                ↓
#            Fluent Bit
#                ↓
#             Graylog
# =============================================================================

[SERVICE]

    # Flush buffered logs every second.
    # Smaller value = lower latency, but more network traffic.
    Flush        1

    # Fluent Bit internal logging level.
    # Doesn't affect application logs.
    Log_Level    info


# -----------------------------------------------------------------------------
# INPUT
# -----------------------------------------------------------------------------
# Read Docker container stdout/stderr logs.
#
# Docker stores every container log as a JSON file under:
# /var/lib/docker/containers/<container-id>/<container-id>-json.log
#
# Fluent Bit tails these files similarly to "tail -f".
# -----------------------------------------------------------------------------

[INPUT]

    Name              tail

    # Read logs from all Docker containers.
    Path              /var/lib/docker/containers/*/*.log

    # Parse Docker JSON wrapper.
    # The actual application log is inside the "log" field.
    Parser            docker

    Tag               docker.*


# -----------------------------------------------------------------------------
# OUTPUT
# -----------------------------------------------------------------------------
# Send logs to Graylog using GELF over UDP.
#
# Graylog must have GELF UDP Input configured on port 12201.
# -----------------------------------------------------------------------------

[OUTPUT]

    Name              gelf

    Match             docker.*

    Host              graylog

    Port              12201

    Mode              udp