[PARSER]
    # Parser name referenced by FILTER.
    Name        spring_boot_json

    # The inner application record is JSON.
    Format      json

    # Spring Boot uses @timestamp for the application event time.
    Time_Key    @timestamp

    # Example:
    # 2026-07-11T13:51:41.545939078Z
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z

    # Preserve the original timestamp field in the parsed record.
    Time_Keep   On