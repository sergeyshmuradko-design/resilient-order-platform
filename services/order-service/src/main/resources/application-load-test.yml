spring:
  cache:
    type: simple
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
  datasource:
    hikari:
      # Намеренно маленький pool для демонстрации насыщения.
      maximum-pool-size: 2
      minimum-idle: 1

app:
  outbox:
    publisher:
      enabled: false
  messaging:
    rabbit:
      enabled: false
    kafka:
      enabled: false
  rate-limit:
    type: noop
  payment-client:
    type: noop

management:
  tracing:
    sampling:
      probability: 0.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
  health:
    redis:
      enabled: false