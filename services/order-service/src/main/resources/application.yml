server:
  port: 8081
  tomcat:
    mbeanregistry:
      enabled: true

logging:
  structured:
    format:
      console: logstash
    json:
      add:
        service: ${spring.application.name}
  pattern:
    level: "%5p [traceId=%X{traceId:-}, spanId=%X{spanId:-}]"

resilience4j:
  bulkhead:
    instances:
      exportJobBulkhead:
        max-concurrent-calls: 2 # одновременно максимум 2 export jobs
        max-wait-duration: 0 # третий job не ждёт, а сразу получает ошибку
  retry:
    instances:
      paymentServiceRetry:
        max-attempts: 3
        wait-duration: 500ms
  circuitbreaker:
    instances:
      paymentServiceCircuitBreaker:
        sliding-window-size: 5 # Circuit Breaker смотрит последние 5 вызовов.
        minimum-number-of-calls: 3 # Если после минимум 3 вызовов
        failure-rate-threshold: 50 # процент ошибок >= 50%, он переходит в OPEN.
        wait-duration-in-open-state: 10s

app:
  payment-client:
    type: feign
  outbox:
    publisher:
      fixed-delay-ms: 5000

security:
  jwt:
    secret: ${JWT_SECRET}
  local-users:
    - username: ${ORDER_SERVICE_ADMIN_USERNAME}
      password: ${ORDER_SERVICE_ADMIN_PASSWORD}
      roles:
        - ADMIN
    - username: ${ORDER_SERVICE_USER_USERNAME}
      password: ${ORDER_SERVICE_USER_PASSWORD}
      roles:
        - USER

spring:
  application:
    name: order-service
  cloud:
    openfeign:
      client:
        config:
          payment-service:
            connectTimeout: 1000
            readTimeout: 2000
  kafka:
    template:
      observation-enabled: true
    bootstrap-servers: localhost:9092
    properties:
      schema.registry.url: http://localhost:8085
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all # broker ждёт подтверждение от replicas
      retries: 3 # producer повторит отправку при временной ошибке
      properties:
        enable.idempotence: true # защита от duplicate при retry producer'а
        spring.json.add.type.headers: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    publisher-confirm-type: correlated # RabbitMQ подтвердит, что broker принял message.
    publisher-returns: true # если message не смог попасть ни в одну queue, broker вернёт его producer’у.
    template:
      mandatory: true # требовать return для unroutable messages.
      observation-enabled: true
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 180s
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB}?currentSchema=order_service
    username: ${ORDER_SERVICE_DB_USER}
    password: ${ORDER_SERVICE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      pool-name: OrderServiceHikariPool
      maximum-pool-size: 10 # Максимум 10 соединений к БД одновременно.
      minimum-idle: 2 # Hikari старается держать хотя бы 2 свободных соединения готовым.
      connection-timeout: 3000 # Если все 10 соединений заняты, новый request ждёт максимум 3 секунды. Потом ошибка.
      idle-timeout: 600000 # Свободное соединение может простаивать 10 минут, потом Hikari может его закрыть.
      max-lifetime: 1800000 # Соединение живёт максимум 30 минут, потом пересоздаётся. Это защищает от старых/stale connections.

  jpa:
    open-in-view: false # Когда включено соединение держится принудительно на все время http запроса
    properties:
      hibernate:
        # Hibernate validation ищет таблицы в schema order_service,
        # но сами таблицы создаёт Flyway, а не Hibernate.
        default_schema: order_service
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Единственная schema в списке становится default schema Flyway.
    # Поэтому в SQL-миграциях можно писать CREATE TABLE orders без префикса order_service.
    schemas: order_service
    user: ${ORDER_SERVICE_DB_OWNER_USER}
    password: ${ORDER_SERVICE_DB_OWNER_PASSWORD}

services:
  payment:
    base-url: http://localhost:8082
    connect-timeout-ms: 1000
    read-timeout-ms: 2000

management:
  metrics:
    distribution:
      percentiles-histogram:
        # Включает histogram buckets для всех HTTP server timers.
        # Благодаря этому Prometheus сможет считать p95/p99 через
        # histogram_quantile(), в том числе после масштабирования сервиса.
        http.server.requests: true

      minimum-expected-value:
        # Нижняя ожидаемая граница HTTP latency.
        # Помогает Micrometer не создавать ненужные buckets ниже 5 ms.
        http.server.requests: 5ms

      maximum-expected-value:
        # Верхняя ожидаемая граница.
        # запросы дольше всё равно попадут в +Inf bucket.
        http.server.requests: 10s
  endpoints:
    web:
      exposure:
        # health нужен для проверки состояния,
        # prometheus — для scrape Prometheus server.
        include: health,prometheus
  endpoint:
    health:
      # Позже здесь увидим состояние DB, Redis, RabbitMQ и Kafka,
      # если соответствующие health indicators доступны.
      show-details: when-authorized
  tracing:
    sampling:
      probability: 1.0 # локально отправляем 100% traces
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces # отправляем traces в Jaeger через OTLP HTTP
