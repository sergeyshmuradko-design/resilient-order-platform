server:
  port: 8081

resilience4j:
  retry:
    instances:
      paymentServiceRetry:
        max-attempts: 3
        wait-duration: 500ms
  circuitbreaker:
    instances:
      paymentServiceCircuitBreaker:
        sliding-window-size: 5
        minimum-number-of-calls: 3
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

app:
  payment-client:
    type: feign

spring:
  application:
    name: order-service
  cloud:
    openfeign:
      client:
        config:
          payment-service:
            connectTimeout: 1000
            readTimeout: 2000

services:
  payment:
    base-url: http://localhost:8082
    connect-timeout-ms: 1000
    read-timeout-ms: 2000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics