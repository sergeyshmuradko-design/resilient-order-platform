services:
  postgres:
    image: postgres:16
    container_name: resilient-orders-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: orders_user
      POSTGRES_PASSWORD: orders_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders_user -d orders_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7
    container_name: resilient-orders-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: resilient-orders-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  kafka:
    image: apache/kafka:3.8.1
    container_name: resilient-orders-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,DOCKER://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,DOCKER://kafka:29092 # localhost:9092 → для Spring Boot сервисов, которые запускаются снаружи контейнера, kafka:29092 → для других контейнеров внутри docker-compose network, например schema-registry
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,DOCKER:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 40s

  schema-registry:
    image: confluentinc/cp-schema-registry:8.3.0
    container_name: resilient-orders-schema-registry
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8085:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:29092

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: resilient-orders-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317" # OTLP gRPC endpoint
      - "4318:4318" # OTLP HTTP endpoint
    environment:
      COLLECTOR_OTLP_ENABLED: true

  prometheus:
    image: prom/prometheus
    container_name: resilient-orders-prometheus
    ports:
      - "9090:9090" # Prometheus UI и HTTP API.
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro # Конфигурация targets и scrape interval.
      - prometheus_data:/prometheus # Сохраняем историю метрик между пересозданиями контейнера.
    depends_on:
      - order-service
      - notification-service
      - payment-service

  grafana:
    # Grafana visualizes Prometheus metrics and later hosts alerts.
    image: grafana/grafana
    container_name: resilient-orders-grafana
    ports:
      # Grafana web UI.
      - "3000:3000"
    environment:
      # Local-development credentials only.
      # Later credentials will move to Kubernetes Secrets.
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      # Disable anonymous access.
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      # Persist Grafana's SQLite database and local state.
      - grafana_data:/var/lib/grafana
      # Provision the Prometheus datasource from source-controlled YAML.
      - ./infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      # Provision dashboard providers.
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      # Source-controlled dashboard JSON files.
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    image: resilient-orders/payment-service:local
    container_name: resilient-orders-payment-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
    depends_on:
      - jaeger
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 40s

  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    image: resilient-orders/order-service:local
    container_name: resilient-orders-order-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      # Ограниченный heap для воспроизводимого диагностического сценария.
      #
      # -Xms256m - начальный heap
      # -Xmx256m - максимальный heap
      # HeapDumpOnOutOfMemoryError:
      # автоматически создаёт heap dump при Java heap OOM.
      #
      # HeapDumpPath:
      # задаёт путь к файлу внутри контейнера.
      # JAVA_TOOL_OPTIONS: >-
      #   -Xms256m
      #   -Xmx256m
      #   -XX:+HeapDumpOnOutOfMemoryError
      #   -XX:HeapDumpPath=/diagnostics/order-service-oom.hprof
      SPRING_PROFILES_ACTIVE: load-test
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orders_db
      SPRING_DATASOURCE_USERNAME: orders_user
      SPRING_DATASOURCE_PASSWORD: orders_pass
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_KAFKA_PROPERTIES_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SERVICES_PAYMENT_BASE_URL: http://payment-service:8082
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
    # volumes:
    #   # Heap dump пишется сразу в каталог проекта на host.
    #   # Volume должен быть writable, поэтому :ro здесь не используется.
    #   - ./infra/heap-dumps:/diagnostics
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      schema-registry:
        condition: service_started
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 90s

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    image: resilient-orders/notification-service:local
    container_name: resilient-orders-notification-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orders_db
      SPRING_DATASOURCE_USERNAME: orders_user
      SPRING_DATASOURCE_PASSWORD: orders_pass
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_KAFKA_PROPERTIES_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
      jaeger:
        condition: service_started

  # хранит настройки Graylog: users, dashboards, inputs, streams
  graylog-mongodb:
    image: mongo:7
    container_name: resilient-orders-graylog-mongodb
    restart: unless-stopped
    profiles: ["observability"]
    volumes:
      - graylog_mongodb_data:/data/db

  # хранит сами логи и делает поиск по ним
  graylog-opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: resilient-orders-graylog-opensearch
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      discovery.type: single-node
      plugins.security.disabled: true
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "Local.Dev#OpenSearch.2026!R7x"
      OPENSEARCH_JAVA_OPTS: "-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
    volumes:
      - graylog_opensearch_data:/usr/share/opensearch/data
    mem_limit: 768m
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 180s

  graylog:
    image: graylog/graylog:6.1
    container_name: resilient-orders-graylog
    restart: unless-stopped
    profiles: ["observability"]
    depends_on:
      graylog-mongodb:
        condition: service_started
      graylog-opensearch:
        condition: service_healthy
    ports:
      - "9000:9000" # Graylog UI
      - "12201:12201/udp" # GELF input для логов
    environment:
      GRAYLOG_PASSWORD_SECRET: "some-long-random-secret-for-local-dev"
      GRAYLOG_ROOT_PASSWORD_SHA2: "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918" # admin
      GRAYLOG_HTTP_EXTERNAL_URI: "http://localhost:9000/"
      GRAYLOG_MONGODB_URI: "mongodb://graylog-mongodb:27017/graylog"
      GRAYLOG_ELASTICSEARCH_HOSTS: "http://graylog-opensearch:9200"
    mem_limit: 768m

  fluent-bit:
    image: fluent/fluent-bit:3.1
    container_name: resilient-orders-fluent-bit
    restart: unless-stopped
    profiles: ["observability"]
    depends_on:
      - graylog
      - order-service
      - notification-service
      - payment-service
    volumes:
      # Основная конфигурация Fluent Bit.
      - ./infra/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      # Custom parser for Spring Boot JSON logs.
      - ./infra/fluent-bit/custom-parsers.conf:/fluent-bit/etc/custom-parsers.conf:ro
      # Docker-файлы stdout/stderr всех контейнеров.
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      # Каталог для тестового результата.
      # Fluent Bit пишет сюда уже собранные записи.
      - ./infra/fluent-bit/output:/fluent-bit/collected

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  kafka_data:
  prometheus_data:
  grafana_data:
  graylog_mongodb_data:
  graylog_opensearch_data: